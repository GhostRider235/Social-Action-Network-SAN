<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Admin</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
  <link th:href="@{/css/admin_dashboard.css}" rel="stylesheet">
  <link th:href="@{/css/admin_chatbot.css}" rel="stylesheet">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div>
    <h2>Admin Dashboard</h2>
    <div class="sidebar-links">
      <a th:href="@{/admin_dashboard}" class="active">
        <i class='bx bx-home'></i><span>Inicio</span>
      </a>
      <a th:href="@{/admin/recargas/pendientes}">
        <i class='bx bx-credit-card'></i><span>Recargas Pendientes</span>
      </a>
      <a th:href="@{/admin/fundaciones/pendientes}">
        <i class='bx bx-building-house'></i><span>Fundaciones Pendientes</span>
      </a>
      <a th:href="@{/admin/donaciones}">
        <i class='bx bx-donate-heart'></i><span>Donaciones</span>
      </a>
      <a th:href="@{/admin/proyectos}">
        <i class='bx bx-briefcase'></i><span>Proyectos</span>
      </a>
      <a th:href="@{/admin/voluntarios}">
        <i class='bx bx-group'></i><span>Voluntarios</span>
      </a>
    </div>
  </div>
  <div class="sidebar-footer">

  <form th:action="@{/logout}" method="post">

    <button type="submit" class="logout-btn">
      <i class='bx bx-log-out'></i>
      Cerrar sesión
    </button>

  </form>

</div>
</div>

<!-- Main Content -->
<div class="main-content" id="mainContent">
  <div class="content-header">
    <h2>Bienvenido, Admin</h2>

    <button class="toggle-sidebar" id="toggleSidebar"><i class='bx bx-menu'></i></button>
  </div>

    <div class="dashboard-container">


        <iframe
                title="tablero de proyecto de aula"
                width="100%"
                height="700"
                src="https://app.powerbi.com/view?r=eyJrIjoiMzA5NGI5ZDQtYjRjZC00NTY2LTljNGQtYmM4YjlkMTExYmY2IiwidCI6IjlkMTJiZjNmLWU0ZjYtNDdhYi05MTJmLTFhMmYwZmM0OGFhNCIsImMiOjR9"
                frameborder="0"
                allowfullscreen="true">
        </iframe>

    </div>
</div>
<!-- ================= CHATBOT ADMIN ================= -->

<div id="admin-chatbot">

    <!-- Botón flotante -->
    <div id="admin-chat-toggle" onclick="toggleChat()">
        🤖
    </div>

    <!-- Ventana -->
    <div id="admin-chat-window">

        <!-- Header -->
        <div id="admin-chat-header">

            <div class="chat-title">
                🛡️ Asistente Admin FAN
            </div>

            <button onclick="toggleChat()">✖</button>

        </div>

        <!-- Mensajes -->
        <div id="admin-chat-body">

            <div id="admin-mensajes">

                <div class="admin-message admin-bot">
                    Hola Admin 👋<br>
                    Soy el asistente privado de administración.
                </div>

            </div>

        </div>

        <!-- Input -->
        <div id="admin-chat-input">

            <input
                type="text"
                id="admin-inputMensaje"
                placeholder="Escribe una orden..."
                autocomplete="off"
            />

            <button onclick="enviarMensaje()">
                ➤
            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script th:src="@{/js/admin_chat.js}"></script>
</body>
</html>
