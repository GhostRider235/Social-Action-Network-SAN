<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Proyectos</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <h2 class="mb-4">Proyectos Activos</h2>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Fecha Inicio</th>
                <th>Fecha Fin</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="proyecto : ${proyectos}">
                <td th:text="${proyecto.nombre}"></td>
                <td th:text="${proyecto.descripcion}"></td>
                <td th:text="${#dates.format(proyecto.fechaInicio, 'dd/MM/yyyy')}"></td>
                <td th:text="${#dates.format(proyecto.fechaFin, 'dd/MM/yyyy')}"></td>
                <td th:text="${proyecto.estado}"></td>
                <td>
                    <form th:action="@{'/proyectos/terminar/' + ${proyecto.id}}" method="post" 
                onsubmit="return confirm('¿Seguro que deseas terminar este proyecto?');">
             <button class="btn btn-danger btn-sm" type="submit">Terminar</button>
</form>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
