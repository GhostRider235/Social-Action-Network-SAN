<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recargas Pendientes</title>

  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link th:href="@{/css/admin_dashboard.css}" rel="stylesheet">

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div>

    <h2>Admin Dashboard</h2>

    <div class="sidebar-links">

      <a th:href="@{/admin_dashboard}">
        <i class='bx bx-home'></i>
        <span>Inicio</span>
      </a>

      <a th:href="@{/admin/fundaciones/pendientes}">
        <i class='bx bx-building-house'></i>
        <span>Fundaciones Pendientes</span>
      </a>

      <a th:href="@{/admin/donaciones}">
        <i class='bx bx-donate-heart'></i>
        <span>Donaciones</span>
      </a>

      <a th:href="@{/admin/proyectos}">
        <i class='bx bx-briefcase'></i>
        <span>Proyectos</span>
      </a>

      <a th:href="@{/admin/voluntarios}">
        <i class='bx bx-group'></i>
        <span>Voluntarios</span>
      </a>

    </div>

  </div>

  <!-- FOOTER -->
  <div class="sidebar-footer">

    <form th:action="@{/logout}" method="post">

      <button type="submit" class="logout-btn">
        <i class='bx bx-log-out'></i>
        <span>Cerrar sesión</span>
      </button>

    </form>

  </div>

</div>

<!-- MAIN -->
<div class="main-content" id="mainContent">

  <!-- HEADER -->
  <div class="content-header">

    <span>Recargas Pendientes</span>

    <button class="toggle-sidebar" id="toggleSidebar">
      <i class='bx bx-menu'></i>
    </button>

  </div>

  <!-- BOTÓN VOLVER -->
  <div class="return-btn-container">

    <a th:href="@{/admin_dashboard}" class="return-btn">
      <i class='bx bx-arrow-back'></i>
      Volver al Dashboard
    </a>

  </div>

  <!-- CARD -->
  <div class="section-card">

    <h3>
      <i class='bx bx-credit-card'></i>
      Recargas Pendientes
    </h3>

    <p>
      Valida las recargas enviadas por los usuarios antes de aprobarlas.
    </p>

    <br>

    <!-- TABLA -->
    <table>

      <thead>
      <tr>
        <th>Usuario</th>
        <th>Monto</th>
        <th>Descripción</th>
        <th>Fecha</th>
        <th>Comprobante</th>
        <th>Acciones</th>
      </tr>
      </thead>

      <tbody>

      <tr th:each="recarga : ${recargasPendientes}">

        <!-- USUARIO -->
        <td th:text="${recarga.usuarioId}"></td>

        <!-- MONTO -->
        <td th:text="${'$ ' + recarga.monto}"></td>

        <!-- DESCRIPCIÓN -->
        <td th:text="${recarga.descripcion}"></td>

        <!-- FECHA -->
        <td th:text="${#dates.format(recarga.fecha, 'dd/MM/yyyy HH:mm')}"></td>

        <!-- PDF -->
        <td>

          <a th:if="${recarga.comprobantePdf != null}"
             th:href="@{'/uploads/recargas/' + ${recarga.comprobantePdf}}"
             target="_blank"
             class="btn-pdf">

            <i class='bx bxs-file-pdf'></i>
            Ver PDF

          </a>

          <span th:if="${recarga.comprobantePdf == null}">
            Sin comprobante
          </span>

        </td>

        <!-- ACCIONES -->
        <td class="actions-cell">

          <!-- APROBAR -->
          <form th:action="@{'/admin/recarga/aprobar/' + ${recarga.id}}"
                method="post">

            <button type="submit" class="approve-btn">

              <i class='bx bx-check'></i>
              Aprobar

            </button>

          </form>

          <!-- RECHAZAR -->
          <form th:action="@{'/admin/recarga/rechazar/' + ${recarga.id}}"
                method="post">

            <button type="submit" class="reject-btn">

              <i class='bx bx-x'></i>
              Rechazar

            </button>

          </form>

        </td>

      </tr>

      </tbody>

    </table>

  </div>

</div>

<!-- JS SIDEBAR -->
<script>

  const toggleSidebar = document.getElementById("toggleSidebar");
  const sidebar = document.getElementById("sidebar");
  const mainContent = document.getElementById("mainContent");

  toggleSidebar.addEventListener("click", () => {

    sidebar.classList.toggle("collapsed");
    mainContent.classList.toggle("expanded");

  });

</script>

</body>
</html>
