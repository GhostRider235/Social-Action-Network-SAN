<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recargas Pendientes</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link th:href="@{/css/admin_dashboard.css}" rel="stylesheet">
</head>
<body>

<div class="sidebar" id="sidebar">
  <div>
    <h2>Admin Dashboard</h2>
    <div class="sidebar-links">
      <a th:href="@{/admin/fundaciones/pendientes}">
        <i class='bx bx-building-house'></i><span>Fundaciones Pendientes</span>
      </a>
      <a th:href="@{/admin/donaciones}">
        <i class='bx bx-donate-heart'></i><span>Donaciones</span>
      </a>
      <a th:href="@{/admin/proyectos}">
        <i class='bx bx-briefcase'></i><span>Proyectos</span>
      </a>
      <a th:href="@{/admin/voluntarios}">
        <i class='bx bx-group'></i><span>Voluntarios</span>
      </a>
    </div>
  </div>
  <div class="sidebar-footer">
    <a th:href="@{/logout}" class="logout-btn">
      <i class='bx bx-log-out'></i><span>Cerrar sesión</span>
    </a>
  </div>
</div>



<div class="main-content" id="mainContent">
  <div class="content-header">
    <span>Recargas Pendientes</span>
    <button class="toggle-sidebar" id="toggleSidebar"><i class='bx bx-menu'></i></button>
  </div>
  <!-- 🔹 Botón para volver al dashboard -->
<div class="return-btn-container">
  <a th:href="@{/admin_dashboard}" class="return-btn">
    <i class='bx bx-arrow-back'></i> Volver al Dashboard
  </a>
</div>

  <div class="section-card">
    <h3><i class='bx bx-credit-card'></i> Recargas Pendientes</h3>
    <p>Valida las recargas enviadas por los usuarios antes de aprobarlas.</p><br>

    <table>
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Monto</th>
          <th>Descripción</th>
          <th>Fecha</th>
          <th>Acciones</th>
          <th>Comprobante</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="recarga : ${recargasPendientes}">
    <td th:text="${recarga.usuarioId}"></td>
    <td th:text="${recarga.monto}"></td>
    <td th:text="${recarga.descripcion}"></td>
    <td th:text="${#dates.format(recarga.fecha, 'dd/MM/yyyy HH:mm')}"></td>

    <!-- Comprobante -->
    <td>
    <a th:if="${recarga.comprobantePdf != null}" 
       th:href="@{'/uploads/recargas/' + ${recarga.comprobantePdf}}" 
       target="_blank">
       Ver PDF
    </a>
</td>


    <!-- Acciones -->
    <td class="actions-cell">
        <form th:action="@{'/admin/recarga/aprobar/' + ${recarga.id}}" method="post">
            <button type="submit" class="approve-btn">Aprobar</button>
        </form>
        <form th:action="@{'/admin/recarga/rechazar/' + ${recarga.id}}" method="post">
            <button type="submit" class="reject-btn">Rechazar</button>
        </form>
    </td>
</tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
