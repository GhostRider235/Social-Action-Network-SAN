<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Proyecto</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <h2 class="text-center mb-4 text-primary">Crear Nuevo Proyecto</h2>
                
                <form th:action="@{/proyectos/guardar}" th:object="${proyecto}" method="post">
                    <input type="hidden" th:field="*{fundacionId}">

                    <div class="mb-3">
                        <label class="form-label">Nombre:</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción:</label>
                        <textarea th:field="*{descripcion}" class="form-control" rows="3" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fecha Inicio:</label>
                        <input type="date" th:field="*{fechaInicio}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fecha Fin:</label>
                        <input type="date" th:field="*{fechaFin}" class="form-control" required>
                    </div>

                    <!-- Campo Sí/No para recibir donaciones -->
                    <div class="mb-3">
                        <label class="form-label d-block">¿Desea recibir donaciones?</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{recibirDonaciones}" value="true" id="donacionesSi" required>
                            <label class="form-check-label" for="donacionesSi">Sí</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{recibirDonaciones}" value="false" id="donacionesNo">
                            <label class="form-check-label" for="donacionesNo">No</label>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/fundacion/dashboard/{id}(id=${proyecto.fundacionId})}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar Proyecto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
