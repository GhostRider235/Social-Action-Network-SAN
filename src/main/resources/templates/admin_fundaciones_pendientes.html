<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fundaciones Pendientes</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
  <link th:href="@{/css/admin_dashboard.css}" rel="stylesheet">
</head>
<body>

<div class="sidebar" id="sidebar">
  <div>
    <h2>Admin Dashboard</h2>
    <div class="sidebar-links">
      <a th:href="@{/admin_dashboard}" class="active">
        <i class='bx bx-home'></i><span>Inicio</span>
      </a>
      <a th:href="@{/admin/recargas/pendientes}">
        <i class='bx bx-credit-card'></i><span>Recargas Pendientes</span>
      </a>
      
      <a th:href="@{/admin/donaciones}">
        <i class='bx bx-donate-heart'></i><span>Donaciones</span>
      </a>
      <a th:href="@{/admin/proyectos}">
        <i class='bx bx-briefcase'></i><span>Proyectos</span>
      </a>
      <a th:href="@{/admin/voluntarios}">
        <i class='bx bx-group'></i><span>Voluntarios</span>
      </a>
    </div>
  </div>
  <div class="sidebar-footer">
    <a th:href="@{/logout}" class="logout-btn"><i class='bx bx-log-out'></i><span>Cerrar sesión</span></a>
  </div>
</div>
<!-- encabezado -->
<div class="main-content" id="mainContent">
  <div class="content-header">
    <span>Fundaciones Pendientes</span>
    <button class="toggle-sidebar" id="toggleSidebar"><i class='bx bx-menu'></i></button>
  </div>
   <!-- 🔹 Botón para volver al dashboard -->
  <div class="return-btn-container">
    <a th:href="@{/admin_dashboard}" class="return-btn">
      <i class='bx bx-arrow-back'></i> Volver al Dashboard
    </a>
  </div>

  <div class="section-card">
    <h3><i class='bx bx-building-house'></i> Solicitudes de Fundaciones</h3>
    <p>Aprueba o rechaza las fundaciones que están esperando validación.</p><br>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Contacto</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="fundacion : ${fundacionesPendientes}">
          <td th:text="${fundacion.nombre}"></td>
          <td th:text="${fundacion.correo}"></td>
          <td th:text="${fundacion.contacto}"></td>
          <td class="actions-cell">
            <form th:action="@{'/admin/aprobar/' + ${fundacion.id}}" method="post">
              <button type="submit" class="approve-btn">Aprobar</button>
            </form>
            <form th:action="@{'/admin/rechazar/' + ${fundacion.id}}" method="post">
              <button type="submit" class="reject-btn">Rechazar</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
